<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Rhine Media</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/styles/main.scss" />
</head>
<body>

  <header class="header">
    <div class="container header__inner">
      <a href="/" class="header__logo">
        <span class="header__logo-mark">RM</span>
        <span class="header__logo-text">Rhine <span>Media</span></span>
      </a>

      <nav class="header__nav">
        <ul class="header__nav-list">
          <li><a href="#verticals">Verticals</a></li>
          <li><a href="#traffic">Traffic Sources</a></li>
          <li><a href="#partners">Partners</a></li>
          <li><a href="#why-us">Why Us</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
      </nav>

      <div class="header__actions">
        <a href="contact.html" class="btn btn--ghost">Get in Touch</a>
        <a href="contact.html" class="btn btn--primary">Start Cooperation</a>
        <button class="header__burger" id="burger"><span></span><span></span><span></span></button>
      </div>
    </div>
  </header>

  <main class="contact-page">
    <div class="container">
      <div class="contact">
        <h1 class="contact__title">Get in Touch</h1>
        <p class="contact__lead">Tell us about your project or ask any questions — we’ll get back within one business day.</p>

        <form class="contact__form" action="#" method="post">
          <div class="form-row">
            <input type="text" name="name" placeholder="Your name" required />
            <input type="email" name="email" placeholder="Email address" required />
          </div>

          <div class="form-row">
            <input type="text" name="company" placeholder="Company (optional)" />
          </div>

          <div class="form-row">
            <textarea name="message" rows="6" placeholder="Project details" required></textarea>
          </div>

          <div class="form-row">
            <button type="submit" class="btn btn--primary">Send Message</button>
          </div>
        </form>
      </div>
    </div>
  </main>

  <script type="module" src="/src/scripts/main.js"></script>
</body>
</html>
